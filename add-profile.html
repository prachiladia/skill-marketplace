<h2>Add Your Profile</h2>

<form onsubmit="addProfile(event)">

    <input id="name" placeholder="Your Name" required><br>
    <input id="skill" placeholder="Your Skill" required><br>
    <input id="price" placeholder="Price per hour" required><br>
    <textarea id="desc" placeholder="Description"></textarea><br>

    <button type="submit">Add Profile</button>
window.location.href = "dashboard.html";
</form>
